<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Câu Cá Vạn Cân - Đại Chiến Kéo Co</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #07161b, #1b4965, #62b6cb);
            color: #fff;
            text-align: center;
            padding: 10px;
            margin: 0;
            user-select: none;
        }
        .container {
            max-width: 650px;
            margin: 10px auto;
            background: rgba(10, 25, 30, 0.85);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            border: 2px solid #62b6cb;
        }
        h1 { color: #ffd700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); margin-bottom: 5px; font-size: 28px;}
        
        .stats p { margin: 8px 0; font-size: 15px; }
        .highlight { color: #ffd700; font-weight: bold; }
        .weight-highlight { color: #ff4d4d; font-weight: bold; font-size: 18px; }

        /* Boss Area */
        .boss-section {
            background: rgba(214, 40, 40, 0.15);
            border: 2px solid #d62828;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
        }

        /* NEW TUG OF WAR UI */
        .tug-container {
            width: 100%; height: 35px; background: #222; border: 2px solid #ffd700;
            border-radius: 8px; position: relative; overflow: hidden; margin: 15px 0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            display: flex;
        }
        .side-boss { width: 50%; height: 100%; background: rgba(214, 40, 40, 0.4); text-align: left; padding-left: 10px; line-height: 35px; font-size: 12px; color: #ff8a80;}
        .side-player { width: 50%; height: 100%; background: rgba(0, 180, 216, 0.4); text-align: right; padding-right: 10px; line-height: 35px; font-size: 12px; color: #90e0ef;}
        
        #tug-line {
            position: absolute; height: 100%; width: 6px; background: #fff;
            left: 50%; top: 0; transform: translateX(-50%);
            box-shadow: 0 0 15px #fff, 0 0 5px #00ff00;
            transition: left 0.05s ease-out;
        }

        .timer { font-size: 20px; color: #ffb703; font-weight: bold; margin: 5px 0;}

        /* Scrollable Skill Grids */
        .grid-skills { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 8px; 
            margin-top: 15px;
            max-height: 200px; 
            overflow-y: auto;
            padding-right: 5px;
        }
        .grid-skills::-webkit-scrollbar { width: 6px; }
        .grid-skills::-webkit-scrollbar-track { background: #111; border-radius: 10px;}
        .grid-skills::-webkit-scrollbar-thumb { background: #62b6cb; border-radius: 10px;}

        .skill-btn {
            background: linear-gradient(45deg, #2b1031, #5d1a6b); color: white;
            border: 1px solid #b768c9; padding: 8px 4px; font-size: 12px;
            font-weight: bold; border-radius: 6px; cursor: pointer;
        }
        .skill-btn:disabled { background: #222; color: #666; border-color: #444; cursor: not-allowed; }
        .skill-drop { background: linear-gradient(45deg, #7f0000, #b71c1c); border-color: #ff5252;}

        button.action {
            background: linear-gradient(45deg, #0077b6, #0096c7); color: white;
            border: none; padding: 12px 24px; font-size: 16px; font-weight: bold;
            border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px;
        }
        button.action:hover { filter: brightness(1.2); }
        
        /* Shop UI */
        .shop-section {
            background: rgba(0, 0, 0, 0.3); border: 1px solid #62b6cb;
            padding: 15px; border-radius: 10px; margin-top: 20px;
        }
        .shop-section h3 { margin-top: 0; color: #bee9e8; border-bottom: 1px solid #62b6cb; padding-bottom: 5px; font-size: 18px;}
        button.upgrade { background: #2c7a7b; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold;}
        
        .shop-skill { background: #b08d57; color: white; border: none; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 11px;}
        .shop-skill:disabled { background: #333; color: #666; cursor: not-allowed; }
        .shop-drop-info { background: #1a1a1a; color: #ff8a80; border: 1px dashed #ff5252; padding: 6px; border-radius: 4px; font-size: 11px; cursor: default;}

        /* CLICK BUTTON FOR TUG OF WAR */
        #pull-btn {
            width: 100%; height: 80px; background: linear-gradient(135deg, #ffb703, #fb8500);
            border: none; border-radius: 12px; margin-top: 15px;
            font-size: 22px; color: #fff; cursor: pointer; font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            box-shadow: 0 5px 15px rgba(251, 133, 0, 0.4);
        }
        #pull-btn:active { transform: scale(0.98); filter: brightness(0.9); }
    </style>
</head>
<body>

<div class="container">
    <h1>CÂU CÁ VẠN CÂN</h1>
    
    <div class="stats">
        <p>⚖️ Trọng Lượng Đã Câu: <span id="tong-can" class="weight-highlight">0</span> Cân | 💰 Linh Thạch: <span id="linh-thach" class="highlight">0</span></p>
    </div>

    <button class="action" id="search-btn" onclick="searchFish()">Quăng Cần Tầm Bảo</button>

    <div class="shop-section" id="shop-area">
        <h3>Thương Hội & Tường Vân 18 Điếu</h3>
        <button class="upgrade" id="buy-rod-btn" onclick="nangCapCan()">Rèn Cần: <span id="rod-name">---</span> (<span id="rod-cost">0</span> LT)</button>
        
        <div class="grid-skills" id="shop-skills-container">
            </div>
    </div>

    <div id="boss-area" class="boss-section">
        <h2 style="margin-top:0; color:#ff4d4d; font-size:20px;">⚠️ THỦY QUÁI <span id="boss-name">BOSS</span> CẮN CÂU!</h2>
        
        <p class="timer">⏱️ Thời gian còn lại: <span id="time-left">20</span>s</p>

        <div class="tug-container">
            <div class="side-boss">◀ BOSS KÉO</div>
            <div class="side-player">BẠN KÉO ▶</div>
            <div id="tug-line"></div>
        </div>

        <div class="grid-skills" id="combat-skills-container">
            </div>

        <button id="pull-btn" onclick="playerPull()">BẤM LIÊN TỤC ĐỂ KÉO!!</button>
    </div>
</div>

<script>
    // --- STATE TRÒ CHƠI ---
    let game = {
        linhThach: 0,
        tongCan: 0,
        rodIndex: 0,
        rods: [
            { name: "Cốt Tre (Lực +10)", cost: 0, clickPower: 1.5 },
            { name: "Huyền Thiết (Lực +30)", cost: 300, clickPower: 3.5 },
            { name: "Long Gân (Lực +80)", cost: 1500, clickPower: 7.0 },
            { name: "Thần Thủy (Lực +200)", cost: 10000, clickPower: 15.0 }
        ],
        skills: {
            // Hệ thống 18 thức Tường Vân Điếu Pháp
            1: { name: "1. Thanh Phong", desc: "Đẩy vạch +3%", cost: 150, unlocked: false, isDrop: false },
            2: { name: "2. Lạc Diệp", desc: "Giảm lực Boss 3s", cost: 400, unlocked: false, isDrop: false },
            3: { name: "3. Phi Trần", desc: "+3 giây", cost: 800, unlocked: false, isDrop: false },
            4: { name: "4. Lưu Thủy", desc: "Đẩy vạch +6%", cost: 1500, unlocked: false, isDrop: false },
            5: { name: "5. Phá Lãng", desc: "Giảm lực Boss 4s", cost: 2500, unlocked: false, isDrop: false },
            6: { name: "6. Ngưng Băng", desc: "Boss đứng yên 2s", cost: 4000, unlocked: false, isDrop: false },
            7: { name: "7. Cuồng Phong", desc: "Đẩy vạch +10%", cost: 6000, unlocked: false, isDrop: false },
            8: { name: "8. Hám Địa", desc: "Boss đứng yên 3s", cost: 9000, unlocked: false, isDrop: false },
            9: { name: "9. Hấp Tinh", desc: "Đẩy vạch +12%", cost: 13000, unlocked: false, isDrop: false },
            10: { name: "10. Ảo Ảnh", desc: "+5 giây", cost: 18000, unlocked: false, isDrop: false },
            11: { name: "11. Kinh Lôi", desc: "Đẩy vạch +15%", cost: 24000, unlocked: false, isDrop: false },
            12: { name: "12. Trục Nhật", desc: "Boss đứng yên 5s", cost: 32000, unlocked: false, isDrop: false },
            13: { name: "13. Tịch Diệt", desc: "Đẩy vạch +20%", cost: 45000, unlocked: false, isDrop: false },
            14: { name: "14. Huyết Hải", desc: "Đẩy +30% (-5s)", cost: 60000, unlocked: false, isDrop: false },
            
            // 4 Tuyệt học cuối rớt từ Boss với tỷ lệ cực thấp (5% -> 1%)
            15: { name: "15. Long Ngâm", desc: "Đẩy +15% & Choáng 2s", cost: 0, unlocked: false, isDrop: true, dropSource: "Cá Chép Tinh" },
            16: { name: "16. Quy Tức", desc: "Boss yếu 80% (6s)", cost: 0, unlocked: false, isDrop: true, dropSource: "Thạch Quy" },
            17: { name: "17. Kình Thôn", desc: "Đẩy +25%", cost: 0, unlocked: false, isDrop: true, dropSource: "Hắc Kình" },
            18: { name: "18. Tường Vân", desc: "Đẩy +35% & +5 Giây", cost: 0, unlocked: false, isDrop: true, dropSource: "Thôn Thiên" }
        }
    };

    const bossList = [
        { name: "Cá Chép Tinh", bossPower: 0.25, reward: 500, weight: 600, dropId: 15, dropChance: 0.05 },     // 5% Rớt
        { name: "Thạch Quy Ngàn Cân", bossPower: 0.45, reward: 2000, weight: 2500, dropId: 16, dropChance: 0.03 }, // 30% -> 3% Rớt
        { name: "Hắc Hải Kình Ngư", bossPower: 0.75, reward: 6000, weight: 10000, dropId: 17, dropChance: 0.02 },  // 2% Rớt
        { name: "Thôn Thiên Ma Thú", bossPower: 1.30, reward: 30000, weight: 50000, dropId: 18, dropChance: 0.01 } // 1% Rớt cực hiếm!
    ];

    // --- BIẾN ĐIỀU KHIỂN TRẬN ĐẤU ---
    let isFighting = false;
    let tugPosition = 50; // Vị trí vạch (50% là ở giữa)
    let timeLeft = 20;    // Trận đấu Boss chỉ có 20 giây để dứt điểm
    let loopId, timerId;
    let currentBoss = {};
    
    // Trạng thái hiệu ứng kỹ năng
    let bossStunned = false;
    let bossWeakened = false;
    let bossWeakMultiplier = 1;

    let skillsOnCooldown = {};

    function renderSkillsUI() {
        let shopHtml = '';
        let combatHtml = '';

        for (let i = 1; i <= 18; i++) {
            let skill = game.skills[i];
            
            if (skill.isDrop) {
                if (skill.unlocked) {
                    shopHtml += `<button class="shop-drop-info" style="background:#2c7a7b; color:white;">Đã Ngộ: ${skill.name}</button>`;
                } else {
                    shopHtml += `<div class="shop-drop-info">Tỷ lệ ${(bossList[i-15].dropChance*100)}%: Giết [${skill.dropSource}]</div>`;
                }
            } else {
                if (skill.unlocked) {
                    shopHtml += `<button class="shop-skill" disabled>Đã Mua: ${skill.name}</button>`;
                } else {
                    shopHtml += `<button class="shop-skill" id="shop-skill-${i}" onclick="buySkill(${i})">${skill.name} (${skill.cost} LT)</button>`;
                }
            }

            if (skill.unlocked) {
                let extraClass = skill.isDrop ? "skill-drop" : "";
                combatHtml += `<button class="skill-btn ${extraClass}" id="skill-${i}" onclick="useSkill(${i})">
                                ${skill.name}<br><span style="font-weight:normal; font-size:10px;">${skill.desc}</span>
                               </button>`;
            }
        }
        document.getElementById('shop-skills-container').innerHTML = shopHtml;
        document.getElementById('combat-skills-container').innerHTML = combatHtml;
    }

    // --- CƠ CHẾ QUĂNG CẦN (5% GẶP BOSS) ---
    function searchFish() {
        if(isFighting) return;
        
        // Tỷ lệ xuất hiện Boss hạ thấp xuống còn 5% (0.05)
        if (Math.random() < 0.05) {
            startBossTugOfWar();
        } else {
            // Câu cá thường nhanh
            let currentRod = game.rods[game.rodIndex];
            let caThuong = Math.floor(Math.random() * 20 + 5) * (game.rodIndex + 1);
            game.linhThach += caThuong * 2;
            game.tongCan += caThuong;
            updateIdleUI();
        }
    }

    // --- KHỞI CHẠY TRẬN KÉO CO ---
    function startBossTugOfWar() {
        isFighting = true;
        document.getElementById('search-btn').style.display = "none";
        document.getElementById('shop-area').style.display = "none";
        document.getElementById('boss-area').style.display = "block";
        
        // Chọn Boss tương ứng cấp độ Cần
        let index = Math.min(game.rodIndex, bossList.length - 1);
        let b = bossList[index];
        currentBoss = { ...b };
        
        tugPosition = 50; // Reset vạch về giữa
        timeLeft = 20;    // Reset thời gian
        bossStunned = false;
        bossWeakened = false;
        bossWeakMultiplier = 1;
        skillsOnCooldown = {};

        document.getElementById('tug-line').style.left = tugPosition + "%";
        document.getElementById('time-left').innerText = timeLeft;

        renderSkillsUI();
        document.getElementById('boss-name').innerText = currentBoss.name.toUpperCase();

        timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('time-left').innerText = timeLeft;
            if (timeLeft <= 0) endFight(false); // Hết giờ = Thua
        }, 1000);

        loopId = requestAnimationFrame(bossPullLoop);
    }

    // --- LỰC KÉO TỰ ĐỘNG CỦA BOSS (Chạy theo khung hình) ---
    function bossPullLoop() {
        if (!isFighting) return;

        if (!bossStunned) {
            let finalBossPower = currentBoss.bossPower * bossWeakMultiplier;
            // Boss liên tục kéo vạch về phía bên TRÁI (0%)
            tugPosition -= finalBossPower; 
        }

        // Cập nhật UI vạch kẻ
        document.getElementById('tug-line').style.left = tugPosition + "%";

        // Kiểm tra điều kiện thắng/thua lập tức
        if (tugPosition <= 0) {
            endFight(false); // Vạch chạm đỉnh bên trái -> Boss kéo sổng mất cá
        } else if (tugPosition >= 100) {
            endFight(true);  // Vạch chạm đỉnh bên phải -> Bạn thu cần thành công!
        } else {
            loopId = requestAnimationFrame(bossPullLoop);
        }
    }

    // --- NGƯỜI CHƠI BẤM CLICK ĐỂ KÉO CẦN ---
    function playerPull() {
        if (!isFighting) return;
        
        let currentRod = game.rods[game.rodIndex];
        // Mỗi cú click đẩy vạch về phía bên PHẢI (100%)
        tugPosition += currentRod.clickPower; 
        
        if (tugPosition > 100) tugPosition = 100;
        document.getElementById('tug-line').style.left = tugPosition + "%";
    }

    // --- KẾT THÚC TRẬN ĐẤU ---
    function endFight(win) {
        isFighting = false;
        clearInterval(timerId);
        cancelAnimationFrame(loopId);

        document.getElementById('search-btn').style.display = "block";
        document.getElementById('shop-area').style.display = "block";
        document.getElementById('boss-area').style.display = "none";

        if (win) {
            game.linhThach += currentBoss.reward;
            game.tongCan += currentBoss.weight;
            let alertMsg = `🎉 THÀNH CÔNG! Bạn đã dòng và kéo rách mang ${currentBoss.name}, thu về ${currentBoss.weight} Cân!\n`;
            
            // XỬ LÝ RỚT TUYỆT HỌC KỲ HIẾM (1% - 5%)
            if (currentBoss.dropId && !game.skills[currentBoss.dropId].unlocked) {
                if (Math.random() < currentBoss.dropChance) {
                    game.skills[currentBoss.dropId].unlocked = true;
                    alertMsg += `\n🌟 ĐẠI KỲ NGỘ: Thiên địa cảm ứng! Bạn đã lĩnh ngộ bí kíp cổ cổ độc bản [${game.skills[currentBoss.dropId].name}] rớt ra từ Boss!`;
                }
            }
            alert(alertMsg);
        } else {
            alert(`💥 ĐỨT DÂY! ${currentBoss.name} sức quá khỏe đã kéo phăng lưỡi câu chạy mất!`);
        }
        updateIdleUI();
    }

    // --- HIỆU ỨNG TÁC ĐỘNG ĐẨY VẠCH CỦA KỸ NĂNG ---
    function useSkill(id) {
        if (!isFighting || !game.skills[id].unlocked || skillsOnCooldown[id]) return;

        if (id === 14) { // Huyết Hải
            if (timeLeft <= 5) { alert("Không đủ thời gian hiến tế!"); return; }
            timeLeft -= 5;
            document.getElementById('time-left').innerText = timeLeft;
            tugPosition += 30; // Đẩy mạnh 30% vạch tiến về phía thắng
        } 
        else if (id === 1) tugPosition += 3;
        else if (id === 2) { bossWeakMultiplier = 0.5; setTimeout(() => { bossWeakMultiplier = 1; }, 3000); }
        else if (id === 3) { timeLeft += 3; document.getElementById('time-left').innerText = timeLeft; }
        else if (id === 4) tugPosition += 6;
        else if (id === 5) { bossWeakMultiplier = 0.4; setTimeout(() => { bossWeakMultiplier = 1; }, 4000); }
        else if (id === 6) { bossStunned = true; setTimeout(() => { bossStunned = false; }, 2000); }
        else if (id === 7) tugPosition += 10;
        else if (id === 8) { bossStunned = true; setTimeout(() => { bossStunned = false; }, 3000); }
        else if (id === 9) tugPosition += 12;
        else if (id === 10) { timeLeft += 5; document.getElementById('time-left').innerText = timeLeft; }
        else if (id === 11) tugPosition += 15;
        else if (id === 12) { bossStunned = true; setTimeout(() => { bossStunned = false; }, 5000); }
        else if (id === 13) tugPosition += 20;
        
        // 4 chiêu Tuyệt học tối cao rơi từ Boss
        else if (id === 15) { tugPosition += 15; bossStunned = true; setTimeout(() => { bossStunned = false; }, 2000); } // Long Ngâm
        else if (id === 16) { bossWeakMultiplier = 0.2; setTimeout(() => { bossWeakMultiplier = 1; }, 6000); }        // Quy Tức (giảm 80% lực boss)
        else if (id === 17) tugPosition += 25;                                                                        // Kình Thôn
        else if (id === 18) { tugPosition += 35; timeLeft += 5; document.getElementById('time-left').innerText = timeLeft; } // Tường Vân

        skillsOnCooldown[id] = true;
        let btn = document.getElementById(`skill-${id}`);
        if (btn) btn.disabled = true;
    }

    function buySkill(id) {
        let skill = game.skills[id];
        if (!skill.unlocked && game.linhThach >= skill.cost) {
            game.linhThach -= skill.cost;
            skill.unlocked = true;
            updateIdleUI();
        }
    }

    function nangCapCan() {
        let nextRod = game.rods[game.rodIndex + 1];
        if (nextRod && game.linhThach >= nextRod.cost) {
            game.linhThach -= nextRod.cost;
            game.rodIndex++;
            updateIdleUI();
        }
    }

    function updateIdleUI() {
        document.getElementById('linh-thach').innerText = Math.floor(game.linhThach);
        document.getElementById('tong-can').innerText = Math.floor(game.tongCan);
        
        if (game.rodIndex < game.rods.length - 1) {
            let nextRod = game.rods[game.rodIndex + 1];
            document.getElementById('rod-name').innerText = nextRod.name;
            document.getElementById('rod-cost').innerText = nextRod.cost;
        } else {
            document.getElementById('buy-rod-btn').innerText = "Cần Câu Đạt Cảnh Giới Tối Cao";
            document.getElementById('buy-rod-btn').disabled = true;
        }

        renderSkillsUI();

        for (let i = 1; i <= 18; i++) {
            let skill = game.skills[i];
            if (!skill.isDrop && !skill.unlocked) {
                let btn = document.getElementById(`shop-skill-${i}`);
                if (btn) btn.disabled = game.linhThach < skill.cost;
            }
        }
    }

    updateIdleUI();
</script>

</body>
</html>
